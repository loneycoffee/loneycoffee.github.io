baseURL = "https://tomt.fr"
title = "Théo M."
paginate = 5
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
googleAnalytics = "UA-123-45"
pygmentsUseClasses = true

[minify]
disableXML = true
minifyOutput = true

[params]
env = "production"
title = "Théo M."
description = "Site de Théo M."
keywords = [ "Blog", "Portfolio", "PaperMod" ]
author = "Théo"
images = [ "<link or path of image for opengraph, twitter-cards>" ]
DateFormat = "January 2, 2006"
defaultTheme = "light"
disableThemeToggle = false
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = false
ShowWordCount = false
ShowRssButtonInSectionTermList = false
UseHugoToc = false
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
showtoc = false
tocopen = false

  [params.assets]
  favicon = "/images/pp-modified.png"
  favicon16x16 = "/images/favicon16x16.png"
  favicon32x32 = "/images/favicon32x32.png"
  apple_touch_icon = "/images/apple_touch_icon.png"
  safari_pinned_tab = "/images/apple_touch_icon.png"

  [params.label]
  text = "Théo M."
  icon = "/images/pp-modified.png"
  iconHeight = 50

  [params.profileMode]
  enabled = true
  title = "Théo M."
  subtitle = "Etudiant ingénieur de 19 ans passionné par l'informatique."
  imageUrl = "images/pp-modified.png"
  imageWidth = 200
  imageHeight = 200
  imageTitle = "pp"

    [[params.profileMode.buttons]]
